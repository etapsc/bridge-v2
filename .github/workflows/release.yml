name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build pack archives
        run: bash package.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pack archives
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bridge-full.tar.gz
            bridge-standalone.tar.gz
            bridge-claude-code.tar.gz
            bridge-codex.tar.gz
            bridge-opencode.tar.gz
            bridge-controller.tar.gz
            bridge-multi-repo-claude-code.tar.gz
            bridge-multi-repo-codex.tar.gz
            bridge-dual-agent.tar.gz
            setup.sh
            add-bridge.sh
            install-orchestrators.sh
